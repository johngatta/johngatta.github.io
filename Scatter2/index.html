<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prototype Proficiency Scatter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f7fa;
}

header {
    background:#1f4e79;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.container {
    display:flex;
    height:calc(100vh - 60px);
}

.sidebar {
    width:280px;
    background:white;
    border-right:1px solid #ddd;
    padding:20px;
    overflow-y:auto;
}

.sidebar h3 {
    margin-top:20px;
    color:#1f4e79;
}

.pill-group {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.pill {
    padding:6px 10px;
    border-radius:20px;
    border:1px solid #1f4e79;
    background:white;
    color:#1f4e79;
    cursor:pointer;
    font-size:13px;
}

.pill.active {
    background:#1f4e79;
    color:white;
}

input {
    width:100%;
    padding:5px;
    margin-top:5px;
    margin-bottom:10px;
}

.main {
    flex:1;
    padding:20px;
}

canvas {
    background:white;
    border:1px solid #ddd;
    padding:10px;
}
</style>
</head>
<body>

<header>Prototype Proficiency Scatter</header>

<div class="container">

<div class="sidebar">

<h3>Data Sets</h3>
<div class="pill-group" id="datasetPills">
    <div class="pill active" data-set="ACT">ACT</div>
    <div class="pill" data-set="IAR">IAR</div>
    <div class="pill" data-set="MAP">MAP</div>
</div>

<h3>Performance Filters</h3>

<label>Met Benchmark</label>
<div class="pill-group" id="benchmarkPills">
    <div class="pill active" data-bench="ALL">All</div>
    <div class="pill" data-bench="YES">Yes</div>
    <div class="pill" data-bench="NO">No</div>
</div>

<label>Scores Above</label>
<input type="number" id="scoreAbove">

<label>Scores Below</label>
<input type="number" id="scoreBelow">

<h3>Visualization</h3>
<div class="pill-group" id="chartPills">
    <div class="pill active" data-chart="hDot">Horizontal Dot</div>
    <div class="pill" data-chart="vDot">Vertical Dot</div>
    <div class="pill" data-chart="hBar">Horizontal Bar</div>
    <div class="pill" data-chart="vBar">Vertical Bar</div>
</div>

</div>

<div class="main">
<canvas id="chart"></canvas>
</div>

</div>

<script>

// ---------------- DATA ----------------

const DATA = {
ACT: {
benchmark:21,
data: [
[6,1],[7,1],[9,4],[10,2],[11,1],[12,6],[13,24],[14,32],[15,38],
[16,49],[17,30],[18,38],[19,24],[20,12],[21,22],[22,15],[23,31],
[24,40],[25,43],[26,38],[27,31],[28,24],[29,14],[30,19],[31,17],
[32,15],[33,18],[34,18],[35,34],[36,31]
]},
IAR:{
benchmark:748,
data: [
[650,6],[661,1],[662,5],[672,6],[680,8],[681,6],[688,11],[694,16],[695,2],
[700,13],[706,15],[711,22],[715,13],[716,10],[720,8],[721,12],[724,11],
[725,11],[728,6],[729,13],[732,8],[733,11],[735,4],[737,16],[739,9],
[741,7],[742,13],[744,10],[745,12],[748,11],[749,9],[751,9],[752,12],
[754,8],[755,9],[758,20],[761,18],[764,18],[767,13],[769,9],[770,10],
[772,8],[773,14],[775,6],[776,13],[778,6],[779,6],[781,12],[783,11],
[784,2],[786,15],[789,10],[792,8],[795,18],[798,5],[799,6],[802,14],
[805,11],[809,7],[813,6],[817,1],[822,9],[826,3],[827,2],[832,1],
[839,3],[845,1],[850,2]
]},
MAP:{
benchmark:219,
data: [
[135,1],[136,1],[140,1],[146,1],[147,1],[155,1],[165,1],[169,1],[171,1],[174,1],[176,1],
[177,1],[178,1],[180,1],[184,2],[186,2],[187,1],[188,1],[189,2],[191,5],[192,1],
[193,1],[194,2],[195,1],[196,1],[197,3],[198,2],[199,2],[200,1],[201,11],[202,7],
[203,6],[204,8],[205,10],[206,4],[207,16],[208,9],[209,10],[210,15],[211,10],
[212,11],[213,6],[214,15],[215,15],[216,15],[217,17],[218,17],[219,12],[220,16],
[221,17],[222,17],[223,10],[224,18],[225,14],[226,6],[227,6],[228,8],[229,13],
[230,12],[231,8],[232,15],[233,7],[234,7],[235,12],[236,15],[237,12],[238,6],
[239,6],[240,5],[241,6],[242,3],[243,9],[244,6],[245,7],[246,1],[247,6],
[248,3],[249,2],[250,2],[251,3],[252,1],[253,5],[254,3],[255,2],[256,1],
[257,1],[258,1],[261,1],[262,1],[263,2],[264,3],[265,1],[267,2],[272,1]
]}
};

// ---------------- STATE ----------------

let currentSet="ACT";
let currentChart="hDot";
let benchmarkFilter="ALL";
let chart;

// ---------------- UTILITIES ----------------

function getFilteredData(){
let data = DATA[currentSet].data.slice();
const bench = DATA[currentSet].benchmark;
const above = parseFloat(document.getElementById("scoreAbove").value);
const below = parseFloat(document.getElementById("scoreBelow").value);

data = data.filter(d=>{
let score=d[0];
if(benchmarkFilter==="YES" && score<bench) return false;
if(benchmarkFilter==="NO" && score>=bench) return false;
if(!isNaN(above) && score<above) return false;
if(!isNaN(below) && score>below) return false;
return true;
});

data.sort((a,b)=>a[0]-b[0]);
return data;
}

// Benchmark plugin
const benchmarkLine = {
id:'benchmarkLine',
afterDraw(chart,args,opts){
const {ctx, chartArea:{top,bottom,left,right}, scales:{x,y}} = chart;
const bench = DATA[currentSet].benchmark;

ctx.save();
ctx.setLineDash([6,6]);
ctx.strokeStyle="black";
ctx.fillStyle="black";

if(currentChart==="hDot" || currentChart==="hBar"){
const yPos = y.getPixelForValue(bench);
ctx.beginPath();
ctx.moveTo(left,yPos);
ctx.lineTo(right,yPos);
ctx.stroke();
ctx.fillText("Proficiency Benchmark", right-150, yPos-5);
}
else{
const xPos = x.getPixelForValue(bench);
ctx.beginPath();
ctx.moveTo(xPos,top);
ctx.lineTo(xPos,bottom);
ctx.stroke();
ctx.save();
ctx.translate(xPos+5, top+15);
ctx.rotate(-Math.PI/2);
ctx.fillText("Proficiency Benchmark",0,0);
ctx.restore();
}
ctx.restore();
}
};

// ---------------- RENDER ----------------

function render(){
const data=getFilteredData();
const labels=data.map(d=>d[0]);
const counts=data.map(d=>d[1]);

if(chart) chart.destroy();

const config={
type:(currentChart.includes("Bar"))?"bar":"scatter",
data:{
datasets:[{
label:"Distribution",
data:data.map(d=>({x:d[0],y:d[1]})),
backgroundColor:(currentChart.includes("Bar"))?"rgba(30,144,255,0.5)":"rgba(0,0,0,0)",
borderColor:"#444",
borderWidth:1,
pointRadius:5
}]
},
options:{
plugins:{
tooltip:{
callbacks:{
label:(ctx)=>"Score: "+ctx.raw.x+" | Students: "+ctx.raw.y
}
}
},
scales:{
x:{
type:"linear",
ticks:{precision:0},
title:{display:true,text:(currentChart==="hDot"||currentChart==="hBar")?"Number of Students":"Scale Score"}
},
y:{
type:"linear",
ticks:{precision:0},
title:{display:true,text:(currentChart==="hDot"||currentChart==="hBar")?"Scale Score":"Number of Students"}
}
},
indexAxis:(currentChart==="hBar")?'y':'x'
},
plugins:[benchmarkLine]
};

if(currentChart==="hDot"){
config.data.datasets[0].data=data.map(d=>({x:d[1],y:d[0]}));
}
if(currentChart==="vDot"){
config.data.datasets[0].data=data.map(d=>({x:d[0],y:d[1]}));
}
if(currentChart==="hBar"){
config.data.labels=labels;
config.data.datasets[0].data=counts;
config.data.datasets[0].borderWidth=0;
}
if(currentChart==="vBar"){
config.data.labels=labels;
config.data.datasets[0].data=counts;
config.data.datasets[0].borderWidth=0;
}

chart=new Chart(document.getElementById("chart"),config);
}

render();

// ---------------- EVENTS ----------------

document.querySelectorAll("#datasetPills .pill").forEach(p=>{
p.onclick=()=>{
document.querySelectorAll("#datasetPills .pill").forEach(x=>x.classList.remove("active"));
p.classList.add("active");
currentSet=p.dataset.set;
render();
};
});

document.querySelectorAll("#chartPills .pill").forEach(p=>{
p.onclick=()=>{
document.querySelectorAll("#chartPills .pill").forEach(x=>x.classList.remove("active"));
p.classList.add("active");
currentChart=p.dataset.chart;
render();
};
});

document.querySelectorAll("#benchmarkPills .pill").forEach(p=>{
p.onclick=()=>{
document.querySelectorAll("#benchmarkPills .pill").forEach(x=>x.classList.remove("active"));
p.classList.add("active");
benchmarkFilter=p.dataset.bench;
render();
};
});

document.getElementById("scoreAbove").oninput=render;
document.getElementById("scoreBelow").oninput=render;

</script>

</body>
</html>
