<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Prototype Proficiency Scatter</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root{
      --bg:#ffffff;
      --panel:#f5f7fb;
      --panel2:#eef2f7;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#d7dee8;
      --blue:#2f6fed;
      --blue2:rgba(47,111,237,.35);
      --dotBorder:#4b5563;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header{
      height:64px;
      display:flex;
      align-items:center;
      padding:0 18px;
      border-bottom:1px solid var(--line);
      background:#fff;
      position:sticky;
      top:0;
      z-index:5;
    }
    header h1{
      margin:0;
      font-size:18px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .app{
      display:grid;
      grid-template-columns: 320px 1fr;
      min-height: calc(100vh - 64px);
    }
    aside{
      border-right:1px solid var(--line);
      background:var(--panel);
      padding:14px;
    }
    main{
      padding:14px 16px 18px 16px;
      background:#fff;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
      box-shadow: 0 1px 0 rgba(17,24,39,.03);
    }
    .card-title{
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      margin:0 0 10px 0;
    }

    /* Pills */
    .pill-row{display:flex; gap:8px; flex-wrap:wrap}
    .pill{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:8px 10px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
      font-weight:650;
      transition: all .15s ease;
      user-select:none;
    }
    .pill:hover{border-color:#b9c6dd}
    .pill.active{
      border-color: rgba(47,111,237,.55);
      background: rgba(47,111,237,.08);
      color: #1746b5;
    }

    /* Controls */
    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px 0;
      font-weight:650;
    }
    select, input[type="number"]{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:10px;
      padding:10px 10px;
      font-size:14px;
      outline:none;
    }
    select:focus, input[type="number"]:focus{border-color: rgba(47,111,237,.55); box-shadow: 0 0 0 3px rgba(47,111,237,.10);}

    /* Toggle chart buttons */
    .toolbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:10px;
    }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      padding:8px 10px;
      border-radius:10px;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      transition: all .15s ease;
    }
    .btn:hover{border-color:#b9c6dd}
    .btn.active{
      border-color: rgba(47,111,237,.55);
      background: rgba(47,111,237,.08);
      color: #1746b5;
    }
    .mini{
      font-size:12px;
      color:var(--muted);
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .badge{
      padding:6px 10px;
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:999px;
      font-weight:650;
      color:#334155;
      white-space:nowrap;
    }

    .chart-wrap{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:#fff;
      height: calc(100vh - 64px - 28px);
      min-height: 520px;
    }
    canvas{width:100% !important; height:100% !important;}
    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:8px;
      line-height:1.35;
    }

    .radio-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .radio{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      user-select:none;
    }
    .radio input{margin:0}
    .radio span{
      font-size:13px;
      font-weight:700;
      color:#334155;
    }
    .radio.active{
      border-color: rgba(47,111,237,.55);
      background: rgba(47,111,237,.08);
    }
  </style>
</head>

<body>
  <header>
    <h1>Prototype Proficiency Scatter</h1>
  </header>

  <div class="app">
    <aside>
      <div class="card">
        <div class="card-title">Data Sets</div>
        <div class="pill-row" id="datasetPills">
          <div class="pill active" data-ds="ACT">ACT</div>
          <div class="pill" data-ds="IAR">IAR</div>
          <div class="pill" data-ds="MAP">MAP</div>
        </div>
        <div class="hint" id="datasetHint"></div>
      </div>

      <div class="card">
        <div class="card-title">Performance Filters</div>

        <label>Met Benchmark</label>
        <div class="radio-row" id="metBenchmarkRow">
          <label class="radio" data-met="ALL">
            <input type="radio" name="metBenchmark" value="ALL" checked />
            <span>All</span>
          </label>
          <label class="radio" data-met="YES">
            <input type="radio" name="metBenchmark" value="YES" />
            <span>Yes</span>
          </label>
          <label class="radio" data-met="NO">
            <input type="radio" name="metBenchmark" value="NO" />
            <span>No</span>
          </label>
        </div>

        <div style="height:10px"></div>

        <div class="row">
          <div>
            <label for="scoresAbove">Scores Above (exclusive)</label>
            <input id="scoresAbove" type="number" placeholder="e.g., 25" />
          </div>
          <div>
            <label for="scoresBelow">Scores Below (exclusive)</label>
            <input id="scoresBelow" type="number" placeholder="e.g., 18" />
          </div>
        </div>

        <div class="hint">
          Filters apply together. Example: Met Benchmark = Yes and Scores Below = 30 will keep only scores ≥ benchmark AND &lt; 30.
        </div>
      </div>
    </aside>

    <main>
      <div class="toolbar">
        <button class="btn active" data-view="dot_h">Horizontal Dot Plot</button>
        <button class="btn" data-view="dot_v">Vertical Dot Plot</button>
        <button class="btn" data-view="bar_h">Horizontal Bar Chart</button>
        <button class="btn" data-view="bar_v">Vertical Bar Chart</button>

        <div class="mini">
          <span class="badge" id="benchmarkBadge">Benchmark: —</span>
          <span class="badge" id="studentsBadge">Students: —</span>
        </div>
      </div>

      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </main>
  </div>

  <script>
    // -----------------------------
    // Data
    // -----------------------------
    const DATASETS = {
      ACT: {
        name: "ACT",
        benchmark: 21,
        data: [
          {score:6,count:1},{score:7,count:1},{score:9,count:4},{score:10,count:2},{score:11,count:1},
          {score:12,count:6},{score:13,count:24},{score:14,count:32},{score:15,count:38},{score:16,count:49},
          {score:17,count:30},{score:18,count:38},{score:19,count:24},{score:20,count:12},{score:21,count:22},
          {score:22,count:15},{score:23,count:31},{score:24,count:40},{score:25,count:43},{score:26,count:38},
          {score:27,count:31},{score:28,count:24},{score:29,count:14},{score:30,count:19},{score:31,count:17},
          {score:32,count:15},{score:33,count:18},{score:34,count:18},{score:35,count:34},{score:36,count:31},
        ]
      },
      IAR: {
        name: "IAR",
        benchmark: 750,
        data: [
          {score:650,count:6},{score:661,count:1},{score:662,count:5},{score:672,count:6},{score:680,count:8},
          {score:681,count:6},{score:688,count:11},{score:694,count:16},{score:695,count:2},{score:700,count:13},
          {score:706,count:15},{score:711,count:22},{score:715,count:13},{score:716,count:10},{score:720,count:8},
          {score:721,count:12},{score:724,count:11},{score:725,count:11},{score:728,count:6},{score:729,count:13},
          {score:732,count:8},{score:733,count:11},{score:735,count:4},{score:737,count:16},{score:739,count:9},
          {score:741,count:7},{score:742,count:13},{score:744,count:10},{score:745,count:12},{score:748,count:11},
          {score:749,count:9},{score:751,count:9},{score:752,count:12},{score:754,count:8},{score:755,count:9},
          {score:758,count:20},{score:761,count:18},{score:764,count:18},{score:767,count:13},{score:769,count:9},
          {score:770,count:10},{score:772,count:8},{score:773,count:14},{score:775,count:6},{score:776,count:13},
          {score:778,count:6},{score:779,count:6},{score:781,count:12},{score:783,count:11},{score:784,count:2},
          {score:786,count:15},{score:789,count:10},{score:792,count:8},{score:795,count:18},{score:798,count:5},
          {score:799,count:6},{score:802,count:14},{score:805,count:11},{score:809,count:7},{score:813,count:6},
          {score:817,count:1},{score:822,count:9},{score:826,count:3},{score:827,count:2},{score:832,count:1},
          {score:839,count:3},{score:845,count:1},{score:850,count:2},
        ]
      },
      MAP: {
        name: "MAP",
        benchmark: 219,
        data: [
          {score:135,count:1},{score:136,count:1},{score:140,count:1},{score:146,count:1},{score:147,count:1},
          {score:155,count:1},{score:165,count:1},{score:169,count:1},{score:171,count:1},{score:174,count:1},
          {score:176,count:1},{score:177,count:1},{score:178,count:1},{score:180,count:1},{score:184,count:2},
          {score:186,count:2},{score:187,count:1},{score:188,count:1},{score:189,count:2},{score:191,count:5},
          {score:192,count:1},{score:193,count:1},{score:194,count:2},{score:195,count:1},{score:196,count:1},
          {score:197,count:3},{score:198,count:2},{score:199,count:2},{score:200,count:1},{score:201,count:11},
          {score:202,count:7},{score:203,count:6},{score:204,count:8},{score:205,count:10},{score:206,count:4},
          {score:207,count:16},{score:208,count:9},{score:209,count:10},{score:210,count:15},{score:211,count:10},
          {score:212,count:11},{score:213,count:6},{score:214,count:15},{score:215,count:15},{score:216,count:15},
          {score:217,count:17},{score:218,count:17},{score:219,count:12},{score:220,count:16},{score:221,count:17},
          {score:222,count:17},{score:223,count:10},{score:224,count:18},{score:225,count:14},{score:226,count:6},
          {score:227,count:6},{score:228,count:8},{score:229,count:13},{score:230,count:12},{score:231,count:8},
          {score:232,count:15},{score:233,count:7},{score:234,count:7},{score:235,count:12},{score:236,count:15},
          {score:237,count:12},{score:238,count:6},{score:239,count:6},{score:240,count:5},{score:241,count:6},
          {score:242,count:3},{score:243,count:9},{score:244,count:6},{score:245,count:7},{score:246,count:1},
          {score:247,count:6},{score:248,count:3},{score:249,count:2},{score:250,count:2},{score:251,count:3},
          {score:252,count:1},{score:253,count:5},{score:254,count:3},{score:255,count:2},{score:256,count:1},
          {score:257,count:1},{score:258,count:1},{score:261,count:1},{score:262,count:1},{score:263,count:2},
          {score:264,count:3},{score:265,count:1},{score:267,count:2},{score:272,count:1},
        ]
      }
    };

    // -----------------------------
    // State
    // -----------------------------
    let state = {
      datasetKey: "ACT",
      view: "dot_h", // dot_h, dot_v, bar_h, bar_v
      metBenchmark: "ALL", // ALL, YES, NO
      scoresAbove: null, // exclusive
      scoresBelow: null  // exclusive
    };

    // -----------------------------
    // Helpers
    // -----------------------------
    function parseNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function totalStudents(rows){
      return rows.reduce((sum,r)=>sum + r.count, 0);
    }

    function applyFilters(rows, benchmark){
      // remove zeros (also ensures)
      let out = rows.filter(r => r.count > 0);

      // scores above/below (exclusive)
      if (state.scoresAbove !== null) out = out.filter(r => r.score > state.scoresAbove);
      if (state.scoresBelow !== null) out = out.filter(r => r.score < state.scoresBelow);

      // met benchmark
      if (state.metBenchmark === "YES") out = out.filter(r => r.score >= benchmark);
      if (state.metBenchmark === "NO")  out = out.filter(r => r.score < benchmark);

      return out;
    }

    function getAxisBounds(rows){
      if (!rows.length) return {min: 0, max: 1};
      let min = rows[0].score, max = rows[0].score;
      for (const r of rows){
        if (r.score < min) min = r.score;
        if (r.score > max) max = r.score;
      }
      // small padding so tick labels don't collide with the chart edge
      const pad = Math.max(1, Math.round((max - min) * 0.03));
      return {min: min - pad, max: max + pad};
    }

    function buildDotPointsHorizontal(rows){
      // Horizontal dot plot:
      // y = score, x = count
      return rows.map(r => ({ x: r.count, y: r.score, _score:r.score, _count:r.count }));
    }
    function buildDotPointsVertical(rows){
      // Vertical dot plot:
      // x = score, y = count
      return rows.map(r => ({ x: r.score, y: r.count, _score:r.score, _count:r.count }));
    }

    // -----------------------------
    // "Plugin" to draw benchmark line + label
    // Works for both vertical/horizontal charts by mapping to a target scale.
    // -----------------------------
    const benchmarkLinePlugin = {
      id: 'benchmarkLinePlugin',
      afterDatasetsDraw(chart, args, pluginOptions) {
        const opts = pluginOptions || {};
        const value = opts.value;
        const orientation = opts.orientation; // 'h' means score on y-axis; 'v' means score on x-axis
        if (value === null || value === undefined) return;

        const {ctx, chartArea, scales} = chart;
        if (!chartArea) return;

        // Determine pixel position
        let x1, y1, x2, y2, labelX, labelY, align;
        ctx.save();
        ctx.setLineDash([6, 6]);
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#111827'; // near-black
        ctx.fillStyle = '#111827';
        ctx.font = '12px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif';

        if (orientation === 'h'){
          // score on y axis
          const y = scales.y.getPixelForValue(value);
          x1 = chartArea.left;  y1 = y;
          x2 = chartArea.right; y2 = y;
          labelX = chartArea.right - 6;
          labelY = y - 8;
          align = 'right';
        } else {
          // score on x axis
          const x = scales.x.getPixelForValue(value);
          x1 = x; y1 = chartArea.top;
          x2 = x; y2 = chartArea.bottom;
          labelX = x + 6;
          labelY = chartArea.top + 14;
          align = 'left';
        }

        // Line
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        // Label
        ctx.setLineDash([]);
        ctx.textAlign = align;
        ctx.textBaseline = 'alphabetic';
        const text = 'Proficiency Benchmark';
        ctx.fillText(text, labelX, labelY);

        ctx.restore();
      }
    };

    // -----------------------------
    // Chart init
    // -----------------------------
    const canvas = document.getElementById('chart');
    const benchmarkBadge = document.getElementById('benchmarkBadge');
    const studentsBadge = document.getElementById('studentsBadge');
    const datasetHint = document.getElementById('datasetHint');

    let chart;

    function buildChartConfig(){
      const ds = DATASETS[state.datasetKey];
      const benchmark = ds.benchmark;

      const filtered = applyFilters(ds.data, benchmark);
      const n = totalStudents(filtered);

      benchmarkBadge.textContent = `Benchmark: ${benchmark}`;
      studentsBadge.textContent = `Students: ${n.toLocaleString()}`;
      datasetHint.textContent = `Using ${ds.name} (benchmark = ${benchmark}).`;

      const scoreBounds = getAxisBounds(filtered);

      // Common tooltip
      const tooltipCallbacks = {
        title: () => '',
        label: (ctx) => {
          const raw = ctx.raw || {};
          const s = raw._score ?? (state.view.includes('dot_v') || state.view.includes('bar_v') ? ctx.label : null);
          const c = raw._count ?? (typeof ctx.parsed === 'object' ? (ctx.parsed.x ?? ctx.parsed.y) : null);

          // For bars, we set labels explicitly; use those.
          const score = raw._score ?? (ctx.label !== undefined ? Number(ctx.label) : null);
          const count = raw._count ?? (ctx.parsed?.x ?? ctx.parsed?.y);

          return `Score: ${score}  |  Students: ${count}`;
        }
      };

      const baseOptions = {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 250 },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: tooltipCallbacks,
            displayColors: false,
            padding: 10
          },
          benchmarkLinePlugin: {
            value: benchmark,
            orientation: (state.view === 'dot_h' || state.view === 'bar_h') ? 'h' : 'v'
          },
          title: {
            display: true,
            text: "",
            color: "#111827",
            font: { size: 16, weight: "700" },
            padding: { top: 8, bottom: 10 }
          }
        },
        scales: {}
      };

      // Determine view
      if (state.view === 'dot_h'){
        baseOptions.plugins.title.text = "Score Distribution Dot Plot (Horizontal).";
        baseOptions.scales = {
          x: {
            title: { display: true, text: "Number of Students", color:"#374151", font:{weight:"700"} },
            grid: { color: "#eef2f7" },
            ticks: { color:"#374151", precision: 0 }
          },
          y: {
            title: { display: true, text: "Scale Score", color:"#374151", font:{weight:"700"} },
            grid: { color: "#eef2f7" },
            min: scoreBounds.min,
            max: scoreBounds.max,
            ticks: { color:"#374151", stepSize: 1 }
          }
        };

        return {
          type: 'scatter',
          data: {
            datasets: [{
              data: buildDotPointsHorizontal(filtered),
              pointRadius: 6,
              pointHoverRadius: 7,
              pointBackgroundColor: 'rgba(255,255,255,0)', // transparent fill
              pointBorderColor: getComputedStyle(document.documentElement).getPropertyValue('--dotBorder').trim(),
              pointBorderWidth: 2
            }]
          },
          options: baseOptions,
          plugins: [benchmarkLinePlugin]
        };
      }

      if (state.view === 'dot_v'){
        baseOptions.plugins.title.text = "Score Distribution Dot Plot (Vertical).";
        baseOptions.scales = {
          x: {
            title: { display: true, text: "Scale Score", color:"#374151", font:{weight:"700"} },
            grid: { color: "#eef2f7" },
            min: scoreBounds.min,
            max: scoreBounds.max,
            ticks: { color:"#374151", stepSize: 1 }
          },
          y: {
            title: { display: true, text: "Number of Students", color:"#374151", font:{weight:"700"} },
            grid: { color: "#eef2f7" },
            ticks: { color:"#374151", precision: 0 }
          }
        };

        return {
          type: 'scatter',
          data: {
            datasets: [{
              data: buildDotPointsVertical(filtered),
              pointRadius: 6,
              pointHoverRadius: 7,
              pointBackgroundColor: 'rgba(255,255,255,0)',
              pointBorderColor: getComputedStyle(document.documentElement).getPropertyValue('--dotBorder').trim(),
              pointBorderWidth: 2
            }]
          },
          options: baseOptions,
          plugins: [benchmarkLinePlugin]
        };
      }

      if (state.view === 'bar_h'){
        baseOptions.plugins.title.text = "Score Distribution Bar Graph (Horizontal).";
        // For horizontal bars in Chart.js: indexAxis = 'y'
        baseOptions.indexAxis = 'y';
        baseOptions.scales = {
          x: {
            title: { display: true, text: "Number of Students", color:"#374151", font:{weight:"700"} },
            grid: { color: "#eef2f7" },
            ticks: { color:"#374151", precision: 0 },
            beginAtZero: true
          },
          y: {
            title: { display: true, text: "Scale Score", color:"#374151", font:{weight:"700"} },
            grid: { color: "#eef2f7" },
            ticks: { color:"#374151" }
          }
        };

        const labels = filtered.map(r => String(r.score));
        const values = filtered.map(r => r.count);

        return {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              data: values,
              backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--blue2').trim(),
              borderColor: 'rgba(47,111,237,.55)',
              borderWidth: 1.5,
              // stash for tooltip
              _pairs: filtered
            }]
          },
          options: {
            ...baseOptions,
            plugins: {
              ...baseOptions.plugins,
              tooltip: {
                ...baseOptions.plugins.tooltip,
                callbacks: {
                  title: () => '',
                  label: (ctx) => {
                    const score = Number(ctx.label);
                    const count = ctx.parsed.x;
                    return `Score: ${score}  |  Students: ${count}`;
                  }
                }
              }
            }
          },
          plugins: [benchmarkLinePlugin]
        };
      }

      // bar_v
      baseOptions.plugins.title.text = "Score Distribution Bar Graph (Vertical).";
      baseOptions.scales = {
        x: {
          title: { display: true, text: "Scale Score", color:"#374151", font:{weight:"700"} },
          grid: { color: "#eef2f7" },
          ticks: { color:"#374151" }
        },
        y: {
          title: { display: true, text: "Number of Students", color:"#374151", font:{weight:"700"} },
          grid: { color: "#eef2f7" },
          ticks: { color:"#374151", precision: 0 },
          beginAtZero: true
        }
      };

      const labels = filtered.map(r => String(r.score));
      const values = filtered.map(r => r.count);

      return {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--blue2').trim(),
            borderColor: 'rgba(47,111,237,.55)',
            borderWidth: 1.5,
            _pairs: filtered
          }]
        },
        options: {
          ...baseOptions,
          plugins: {
            ...baseOptions.plugins,
            tooltip: {
              ...baseOptions.plugins.tooltip,
              callbacks: {
                title: () => '',
                label: (ctx) => {
                  const score = Number(ctx.label);
                  const count = ctx.parsed.y;
                  return `Score: ${score}  |  Students: ${count}`;
                }
              }
            }
          }
        },
        plugins: [benchmarkLinePlugin]
      };
    }

    function render(){
      const cfg = buildChartConfig();
      if (chart) chart.destroy();
      chart = new Chart(canvas, cfg);
    }

    // -----------------------------
    // UI wiring
    // -----------------------------
    // Dataset pills
    document.getElementById('datasetPills').addEventListener('click', (e) => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      const key = pill.dataset.ds;
      state.datasetKey = key;

      // toggle UI
      document.querySelectorAll('#datasetPills .pill').forEach(p => p.classList.toggle('active', p.dataset.ds === key));
      render();
    });

    // Met Benchmark radios (with nicer active styling)
    const metRow = document.getElementById('metBenchmarkRow');
    function syncMetActive(){
      const v = state.metBenchmark;
      metRow.querySelectorAll('.radio').forEach(el => {
        el.classList.toggle('active', el.dataset.met === v);
        const input = el.querySelector('input');
        if (input) input.checked = (input.value === v);
      });
    }
    metRow.addEventListener('click', (e) => {
      const wrap = e.target.closest('.radio');
      if (!wrap) return;
      state.metBenchmark = wrap.dataset.met;
      syncMetActive();
      render();
    });

    // Above/below inputs
    const aboveEl = document.getElementById('scoresAbove');
    const belowEl = document.getElementById('scoresBelow');

    function onThresholdChange(){
      state.scoresAbove = parseNum(aboveEl.value);
      state.scoresBelow = parseNum(belowEl.value);
      render();
    }
    aboveEl.addEventListener('input', onThresholdChange);
    belowEl.addEventListener('input', onThresholdChange);

    // View buttons
    document.querySelectorAll('.toolbar .btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.view;
        state.view = v;
        document.querySelectorAll('.toolbar .btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
        render();
      });
    });

    // Initial
    syncMetActive();
    render();
  </script>
</body>
</html>
